<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0d0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>HOF Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{background:#0f0d0a;color:#e8dcc8;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button,input{min-height:44px}
input[type="text"]{font-size:16px!important}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#c4913a;border:2px solid #0f0d0a;cursor:pointer;box-shadow:0 0 6px rgba(196,145,58,.4)}
input[type="range"]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#c4913a;border:2px solid #0f0d0a;cursor:pointer}
::selection{background:rgba(196,145,58,.3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid #3d3228;border-top-color:#c4913a;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useMemo,useEffect,useRef}=React;
const LAHMAN_BASE="https://cdn.jsdelivr.net/gh/chadwickbureau/baseballdatabank@master/core";
let lahmanCache=null;
const playerStatsCache={batting:{},pitching:{}};

/* ═══════════════════════════════════════════
   LAHMAN DATABASE — search, person, stats
   ═══════════════════════════════════════════ */

function csvRow(line){
  const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(q&&line[i+1]==='"'){cur+='"';i++}
      else q=!q;
    }else if(ch===','&&!q){out.push(cur);cur=""}
    else cur+=ch;
  }
  out.push(cur);
  return out;
}

function csvParse(text){
  const lines=text.trim().split(/\r?\n/);if(!lines.length)return[];
  const head=csvRow(lines[0]);
  return lines.slice(1).filter(Boolean).map(line=>{const cols=csvRow(line);const row={};for(let i=0;i<head.length;i++)row[head[i]]=cols[i]||"";return row});
}

function toInnings(ipouts){
  const outs=parseInt(ipouts||0,10);if(!outs)return"0.0";
  const whole=Math.floor(outs/3),rem=outs%3;
  return `${whole}.${rem}`;
}

async function loadLahman(){
  if(lahmanCache)return lahmanCache;
  const [peopleCsv,appsCsv]=await Promise.all([
    fetch(`${LAHMAN_BASE}/People.csv`).then(r=>r.text()),
    fetch(`${LAHMAN_BASE}/Appearances.csv`).then(r=>r.text())
  ]);
  const people=csvParse(peopleCsv),apps=csvParse(appsCsv);

  const peopleById={},appByPlayer={};
  for(const p of people){
    const name=[p.nameFirst,p.nameLast].filter(Boolean).join(" ").trim();if(!name)continue;
    peopleById[p.playerID]={
      id:p.playerID,name,birthYear:parseInt(p.birthYear||0,10)||null,
      debutYear:p.debut?parseInt(p.debut.substring(0,4),10):null,
      finalYear:p.finalGame?parseInt(p.finalGame.substring(0,4),10):null
    };
  }
  for(const a of apps){
    if(!appByPlayer[a.playerID])appByPlayer[a.playerID]={P:0,C:0,"1B":0,"2B":0,"3B":0,SS:0,LF:0,CF:0,RF:0,DH:0};
    const s=appByPlayer[a.playerID];
    s.P+=parseInt(a.G_p||0,10);s.C+=parseInt(a.G_c||0,10);s["1B"]+=parseInt(a.G_1b||0,10);s["2B"]+=parseInt(a.G_2b||0,10);
    s["3B"]+=parseInt(a.G_3b||0,10);s.SS+=parseInt(a.G_ss||0,10);s.LF+=parseInt(a.G_lf||0,10);s.CF+=parseInt(a.G_cf||0,10);
    s.RF+=parseInt(a.G_rf||0,10);s.DH+=parseInt(a.G_dh||0,10);
  }

  lahmanCache={peopleById,appByPlayer};
  return lahmanCache;
}

async function loadPlayerYearlyStats(playerId,isPitcher){
  const kind=isPitcher?"pitching":"batting";
  if(playerStatsCache[kind][playerId])return playerStatsCache[kind][playerId];

  const file=isPitcher?"Pitching.csv":"Batting.csv";
  const txt=await fetch(`${LAHMAN_BASE}/${file}`).then(r=>r.text());
  const lines=txt.trim().split(/\r?\n/);if(lines.length<2)return[];
  const head=csvRow(lines[0]);
  const idx=Object.fromEntries(head.map((h,i)=>[h,i]));
  const out=[];
  for(let i=1;i<lines.length;i++){
    const cols=csvRow(lines[i]);
    if(cols[idx.playerID]!==playerId)continue;
    if(isPitcher){
      out.push({season:parseInt(cols[idx.yearID]||0,10),stat:{wins:parseInt(cols[idx.W]||0,10),strikeOuts:parseInt(cols[idx.SO]||0,10),saves:parseInt(cols[idx.SV]||0,10),inningsPitched:parseInt(cols[idx.IPouts]||0,10)/3,gamesPlayed:parseInt(cols[idx.G]||0,10)}});
    }else{
      out.push({season:parseInt(cols[idx.yearID]||0,10),stat:{hits:parseInt(cols[idx.H]||0,10),homeRuns:parseInt(cols[idx.HR]||0,10),rbi:parseInt(cols[idx.RBI]||0,10),runs:parseInt(cols[idx.R]||0,10),stolenBases:parseInt(cols[idx.SB]||0,10),atBats:parseInt(cols[idx.AB]||0,10),gamesPlayed:parseInt(cols[idx.G]||0,10)}});
    }
  }
  playerStatsCache[kind][playerId]=out;
  return out;
}

async function searchPlayers(query){
  if(!query||query.length<2)return[];
  try{
    const d=await loadLahman();
    const nowYear=new Date().getFullYear();
    return Object.values(d.peopleById)
      .filter(p=>p.name.toLowerCase().includes(query.toLowerCase()))
      .sort((a,b)=>(b.finalYear||0)-(a.finalYear||0))
      .slice(0,10)
      .map(p=>{
        const pos=mapPos(topPos(d.appByPlayer[p.id]||{}));
        const age=p.birthYear?nowYear-p.birthYear:null;
        const hasPitching=(d.appByPlayer[p.id]?.P||0)>0;
        return{id:p.id,name:p.name,pos,currentAge:age,active:(p.finalYear||0)>=nowYear-1,isPitcher:hasPitching,team:""};
      });
  }catch(e){console.warn("Lahman search error:",e);return[]}
}

async function fetchPerson(pid){
  try{
    const d=await loadLahman();const p=d.peopleById[pid];if(!p)return null;
    const nowYear=new Date().getFullYear();
    const pos=topPos(d.appByPlayer[pid]||{});
    return{id:p.id,name:p.name,pos,birthDate:p.birthYear?`${p.birthYear}-01-01`:null,currentAge:p.birthYear?nowYear-p.birthYear:null,
      active:(p.finalYear||0)>=nowYear-1,isPitcher:(d.appByPlayer[pid]?.P||0)>0,debutYear:p.debutYear};
  }catch(e){return null}
}

async function fetchStats(pid,isPitcher){
  try{
    const yby=await loadPlayerYearlyStats(pid,isPitcher);
    const sorted=[...yby].sort((a,b)=>a.season-b.season);
    const career=sorted.reduce((acc,s)=>{
      Object.keys(s.stat).forEach(k=>acc[k]=(acc[k]||0)+(s.stat[k]||0));
      return acc;
    },{});
    return{career,yearByYear:sorted};
  }catch(e){console.warn("Stats error:",e);return null}
}

function parseHitting(s){
  let avg="";if((s.atBats||0)>0){avg=(s.hits/s.atBats).toFixed(3);if(avg[0]==="0")avg=avg.substring(1)}
  return{hits:s.hits!=null?String(s.hits):"",hr:s.homeRuns!=null?String(s.homeRuns):"",rbi:s.rbi!=null?String(s.rbi):"",runs:s.runs!=null?String(s.runs):"",sb:s.stolenBases!=null?String(s.stolenBases):"",avg};
}
function parsePitching(s){return{wins:s.wins!=null?String(s.wins):"",k:s.strikeOuts!=null?String(s.strikeOuts):"",saves:s.saves!=null?String(s.saves):"",ip:toInnings(Math.round((s.inningsPitched||0)*3))}}

function sumToAge(yby,birthYear,age,isP){
  const maxYear=birthYear+age;
  const f=yby.filter(s=>s.season<=maxYear);if(!f.length)return null;
  const keys=isP?["wins","strikeOuts","saves","inningsPitched","gamesPlayed"]:["hits","homeRuns","rbi","runs","stolenBases","atBats","gamesPlayed"];
  const sum={};for(const k of keys)sum[k]=0;
  for(const s of f)for(const k of keys){
    if(k==="inningsPitched")sum[k]+=parseFloat(s.stat[k]||0);
    else sum[k]+=(s.stat[k]||0);
  }
  if(!isP&&sum.atBats>0){let a=(sum.hits/sum.atBats).toFixed(3);if(a[0]==="0")a=a.substring(1);sum.avg=a}
  return sum;
}
function parseSumH(s){return{hits:String(s.hits||0),hr:String(s.homeRuns||0),rbi:String(s.rbi||0),runs:String(s.runs||0),sb:String(s.stolenBases||0),avg:s.avg||""}}
function parseSumP(s){return{wins:String(s.wins||0),k:String(s.strikeOuts||0),saves:String(s.saves||0),ip:toInnings(Math.round((s.inningsPitched||0)*3))}}

function topPos(app){
  const entries=Object.entries(app||{}).filter(([,v])=>v>0);if(!entries.length)return"DH";
  return entries.sort((a,b)=>b[1]-a[1])[0][0];
}

// Map Lahman position code to our app's position codes
function mapPos(pos){
  const m={"P":"SP","TWP":"SP","LF":"LF","CF":"CF","RF":"RF","1B":"1B","2B":"2B","3B":"3B","SS":"SS","C":"C","DH":"DH","OF":"RF","IF":"SS","PR":"RF","PH":"DH"};
  return m[pos]||"DH";
}

/* ═══════════════════════════════════════════
   HOF BENCHMARKS & CALCULATION
   ═══════════════════════════════════════════ */
const PJ={C:{avg:40,label:"Catcher"},"1B":{avg:55.2,label:"First Base"},"2B":{avg:51.5,label:"Second Base"},"3B":{avg:55.2,label:"Third Base"},SS:{avg:52.5,label:"Shortstop"},LF:{avg:54,label:"Left Field"},CF:{avg:57,label:"Center Field"},RF:{avg:56,label:"Right Field"},DH:{avg:52,label:"Designated Hitter"},SP:{avg:62.1,label:"Starting Pitcher"},RP:{avg:36,label:"Relief Pitcher"}};
const ML={
  batter:{hits_3000:{t:3000,l:"3,000 Hit Club",w:35},hits_2500:{t:2500,l:"2,500+ Hits",w:15},hr_500:{t:500,l:"500 HR Club",w:30},hr_350:{t:350,l:"350+ HR",w:10},rbi_1500:{t:1500,l:"1,500+ RBI",w:10},avg_300:{t:.3,l:".300+ Career AVG",w:8},ops_plus_125:{t:125,l:"125+ OPS+",w:12},war_60:{t:60,l:"60+ Career WAR",w:25},war_45:{t:45,l:"45+ Career WAR",w:12},allstar_8:{t:8,l:"8+ All-Star Games",w:10},mvp:{t:1,l:"MVP Award(s)",w:12},gg5:{t:5,l:"5+ Gold Gloves",w:5}},
  pitcher:{w300:{t:300,l:"300 Win Club",w:30},w240:{t:240,l:"240+ Wins",w:15},k3000:{t:3000,l:"3,000 K Club",w:25},k2800:{t:2800,l:"2,800+ K",w:12},era125:{t:125,l:"125+ ERA+",w:15},war_60:{t:60,l:"60+ Career WAR",w:25},war_45:{t:45,l:"45+ Career WAR",w:12},cy:{t:1,l:"Cy Young Award(s)",w:15},as6:{t:6,l:"6+ All-Star Games",w:8}}
};
const ACB={20:1,21:1.8,22:2.5,23:3.2,24:3.9,25:4.5,26:4.8,27:5,28:4.9,29:4.7,30:4.4,31:4,32:3.6,33:3.2,34:2.8,35:2.4,36:2,37:1.6,38:1.2,39:.9,40:.6,41:.4,42:.2};
const ACP={20:.5,21:1.2,22:2,23:2.8,24:3.4,25:3.9,26:4.3,27:4.5,28:4.4,29:4.2,30:3.9,31:3.5,32:3.1,33:2.7,34:2.3,35:1.9,36:1.5,37:1.1,38:.8,39:.5,40:.3,41:.2,42:.1};

function calcHOF(stats,position,isP){
  let sc=0,mx=0,mh=[];
  const ms=isP?ML.pitcher:ML.batter;
  const getStat=(k)=>{
    if(k==="hits_3000"||k==="hits_2500")return stats.hits;if(k==="hr_500"||k==="hr_350")return stats.hr;
    if(k==="rbi_1500")return stats.rbi;if(k==="avg_300")return stats.avg;if(k==="ops_plus_125")return stats.opsPlus;
    if(k.startsWith("war_"))return stats.war;if(k==="allstar_8"||k==="as6")return stats.allstar;
    if(k==="mvp")return stats.mvp;if(k==="gg5")return stats.goldGlove;
    if(k==="w300"||k==="w240")return stats.wins;if(k==="k3000"||k==="k2800")return stats.k;
    if(k==="era125")return stats.eraPlus;if(k==="cy")return stats.cyYoung;return null;
  };
  for(const[k,m]of Object.entries(ms)){mx+=m.w;const sv=getStat(k);if(sv!=null&&sv!==""){const v=parseFloat(sv);if(!isNaN(v)){const r=v/m.t;
    if(r>=1){sc+=m.w;mh.push({label:m.l,exceeded:true})}
    else if(r>=.85){sc+=m.w*(.5+.5*((r-.85)/.15));mh.push({label:m.l,exceeded:false,pct:Math.round(r*100)})}
    else if(r>=.7){sc+=m.w*.2*((r-.7)/.15)}}}}
  if(stats.war&&position){const jd=PJ[position];if(jd){const p7=stats.peak7war||stats.war*.55;const j=(parseFloat(stats.war)+parseFloat(p7))/2;const jr=j/jd.avg;
    if(jr>=1){sc+=20;mh.push({label:"JAWS \u2265 "+jd.avg.toFixed(1)+" ("+jd.label+" avg)",exceeded:true})}
    else if(jr>=.85){sc+=10;mh.push({label:"JAWS near "+jd.label+" avg",exceeded:false,pct:Math.round(jr*100)})}mx+=20}}
  const raw=mx>0?(sc/mx)*100:0;
  return{probability:Math.min(99,Math.max(1,100/(1+Math.exp(-.08*(raw-40))))),milestoneHits:mh};
}

function projectStats(cs,cur,tgt,isP,pm){
  const p={...cs},cv=isP?ACP:ACB,pk=cv[27]||5;
  const cw=parseFloat(cs.war)||0,da=isP?22:21,sp=Math.max(1,cur-da);
  let ect=0;for(let a=da+1;a<=cur;a++)ect+=cv[a]||1;const pt=ect>0?cw/ect:1;
  let pw=cw;for(let a=cur+1;a<=tgt;a++){const c=cv[a]!==undefined?cv[a]:Math.max(0,.3-(a-42)*.15);pw+=Math.max(0,c*pt*pm)}p.war=pw.toFixed(1);
  const skeys=isP?["wins","k","saves","ip"]:["hits","hr","rbi","runs","sb"];
  for(const s of skeys){if(cs[s]!=null&&cs[s]!==""){let v=parseFloat(cs[s])||0;const pr=v/Math.max(1,sp),cf=(cv[cur]||1)/pk;
    for(let a=cur+1;a<=tgt;a++){const fv=cv[a]!==undefined?cv[a]:.1;v+=Math.max(0,pr*(fv/pk)/(cf>0?cf/pk*pk:1)*pm)}p[s]=Math.round(v)}}
  return p;
}

/* ═══════════════════════════════════════════
   UI COMPONENTS
   ═══════════════════════════════════════════ */
function SI({label,name,value,onChange,placeholder,small}){
  return(<div style={small?{flex:"1 1 0",minWidth:0}:{}}>
    <label style={{display:"block",fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#8B7355",marginBottom:"4px"}}>{label}</label>
    <input type="text" inputMode="decimal" name={name} value={value} onChange={onChange} placeholder={placeholder||"\u2014"}
      style={{width:"100%",padding:"8px 10px",background:"#1a1612",border:"1px solid #3d3228",borderRadius:"6px",color:"#e8dcc8",fontSize:"15px",fontFamily:"'IBM Plex Mono',monospace",fontWeight:500,outline:"none",boxSizing:"border-box"}}
      onFocus={e=>{e.target.style.borderColor="#c4913a";e.target.style.boxShadow="0 0 0 2px rgba(196,145,58,.15)"}}
      onBlur={e=>{e.target.style.borderColor="#3d3228";e.target.style.boxShadow="none"}}/>
  </div>);
}
function MC({label,exceeded,pct}){return(<div style={{display:"inline-flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"100px",fontSize:"11px",fontWeight:600,background:exceeded?"rgba(76,175,80,.15)":"rgba(196,145,58,.12)",color:exceeded?"#7dcc80":"#c4913a",border:"1px solid "+(exceeded?"rgba(76,175,80,.3)":"rgba(196,145,58,.25)")}}><span style={{fontSize:"13px"}}>{exceeded?"\u2726":"\u25C7"}</span>{label}{!exceeded&&pct&&<span style={{opacity:.7}}>({pct}%)</span>}</div>)}
function SC({label,value}){return(<div style={{textAlign:"center"}}><div style={{fontSize:"18px",fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:"#e8dcc8"}}>{value}</div><div style={{fontSize:"9px",fontWeight:700,letterSpacing:".1em",color:"#6b5c4a",textTransform:"uppercase"}}>{label}</div></div>)}
function GR({probability:prob,size:sz=200}){
  const sw=14,r=(sz-sw)/2,c=2*Math.PI*r,pr=(prob/100)*c;
  const co=prob>=80?"#4CAF50":prob>=60?"#8BC34A":prob>=40?"#c4913a":prob>=20?"#e67e22":"#c0392b";
  const lb=prob>=90?"LOCK":prob>=75?"STRONG":prob>=55?"LIKELY":prob>=40?"BORDERLINE":prob>=20?"LONG SHOT":"UNLIKELY";
  return(<div style={{position:"relative",width:sz,height:sz}}>
    <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#2a2320" strokeWidth={sw}/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={co} strokeWidth={sw} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c-pr} style={{transition:"stroke-dashoffset .8s cubic-bezier(.4,0,.2,1),stroke .5s"}}/></svg>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:"42px",fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:co,lineHeight:1}}>{prob.toFixed(1)}</div>
      <div style={{fontSize:"11px",fontWeight:700,letterSpacing:".15em",color:"#8B7355",marginTop:"2px"}}>% PROBABILITY</div>
      <div style={{marginTop:"6px",padding:"2px 12px",borderRadius:"100px",background:co+"18",border:"1px solid "+co+"40",fontSize:"10px",fontWeight:800,letterSpacing:".12em",color:co}}>{lb}</div>
    </div>
  </div>);
}

/* ═══════════════════════════════════════════
   PLAYER SEARCH DROPDOWN
   ═══════════════════════════════════════════ */
function PS({value,onChange,onSelect}){
  const[open,setOpen]=useState(false);
  const[q,setQ]=useState(value);
  const[res,setRes]=useState([]);
  const[loading,setLoading]=useState(false);
  const ref=useRef(null);const timer=useRef(null);
  useEffect(()=>{setQ(value)},[value]);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h)}},[]);
  const doSearch=useCallback(v=>{if(timer.current)clearTimeout(timer.current);if(!v||v.length<2){setRes([]);return}
    setLoading(true);timer.current=setTimeout(async()=>{const r=await searchPlayers(v);setRes(r);setLoading(false);setOpen(true)},350)},[]);
  return(
    <div ref={ref} style={{position:"relative",flex:"1 1 200px"}}>
      <label style={{display:"block",fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#8B7355",marginBottom:"4px"}}>Search Any MLB Player {loading&&<span className="spinner" style={{marginLeft:"4px"}}/>}</label>
      <input type="text" value={q} onChange={e=>{const v=e.target.value;setQ(v);onChange(v);doSearch(v)}} onFocus={()=>{if(res.length)setOpen(true)}} placeholder="Type any player name..."
        style={{width:"100%",padding:"8px 10px",background:"#1a1612",border:"1px solid #3d3228",borderRadius:"6px",color:"#e8dcc8",fontSize:"15px",fontFamily:"'IBM Plex Mono',monospace",fontWeight:500,outline:"none",boxSizing:"border-box"}}/>
      {open&&res.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,marginTop:"4px",background:"#1a1612",border:"1px solid #3d3228",borderRadius:"8px",overflow:"hidden",boxShadow:"0 12px 32px rgba(0,0,0,.5)",maxHeight:"360px",overflowY:"auto"}}>
          {res.map(p=>(
            <button key={p.id} onClick={()=>{onSelect(p);setQ(p.name);setOpen(false)}}
              style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"10px 12px",background:"transparent",border:"none",borderBottom:"1px solid #2a2320",color:"#e8dcc8",fontSize:"14px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",textAlign:"left",minHeight:"44px"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(196,145,58,.08)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div><span style={{fontWeight:600}}>{p.name}</span>{!p.active&&<span style={{fontSize:"10px",color:"#6b5c4a",marginLeft:"6px"}}>(historical)</span>}</div>
              <span style={{fontSize:"11px",color:"#6b5c4a",fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"nowrap",marginLeft:"8px"}}>{p.pos!=="?"?p.pos:""}{p.currentAge?" \u00B7 "+p.currentAge:""}{p.team?" \u00B7 "+p.team:""}</span>
            </button>))}
        </div>)}
    </div>);
}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */
function App(){
  const[playerType,setPlayerType]=useState("batter");
  const[position,setPosition]=useState("SS");
  const[playerName,setPlayerName]=useState("");
  const[currentAge,setCurrentAge]=useState("");
  const[projectionAge,setProjectionAge]=useState(28);
  const[performanceMult,setPerformanceMult]=useState(1);
  const[showProjection,setShowProjection]=useState(false);
  const[resetKey,setResetKey]=useState(0);
  const[submitted,setSubmitted]=useState(false);
  const[selPlayer,setSelPlayer]=useState(null);
  const[ageNote,setAgeNote]=useState("");
  const[loading,setLoading]=useState(false);
  const[cache,setCache]=useState(null);
  const[birthYear,setBirthYear]=useState(null);
  const isP=playerType==="pitcher";

  const E={war:"",peak7war:"",hits:"",hr:"",rbi:"",avg:"",opsPlus:"",allstar:"",mvp:"",goldGlove:"",runs:"",sb:"",wins:"",k:"",eraPlus:"",cyYoung:"",saves:"",ip:""};
  const[stats,setStats]=useState(E);
  const hsc=useCallback(e=>{setStats(p=>({...p,[e.target.name]:e.target.value}));setSubmitted(false)},[]);

  const resetAll=()=>{setStats({...E});setPlayerName("");setPlayerType("batter");setPosition("SS");setCurrentAge("");setProjectionAge(28);setShowProjection(false);setPerformanceMult(1);setSubmitted(false);setSelPlayer(null);setAgeNote("");setCache(null);setBirthYear(null);setLoading(false);setResetKey(k=>k+1)};

  // ── Player selected from dropdown ──
  const handlePlayerSelect=async(p)=>{
    setSelPlayer(p);setPlayerName(p.name);setSubmitted(false);setAgeNote("");setLoading(true);

    // 1) Fetch full person details (gets correct position, age, birth date)
    const person=await fetchPerson(p.id);
    if(person){
      const ispit=person.isPitcher;
      setPlayerType(ispit?"pitcher":"batter");
      setPosition(mapPos(person.pos));
      setCurrentAge(person.currentAge?String(person.currentAge):"");
      setProjectionAge(person.currentAge||28);
      const by=person.birthDate?parseInt(person.birthDate.substring(0,4)):null;
      setBirthYear(by);

      // 2) Fetch career + yearByYear stats
      const data=await fetchStats(p.id,ispit);
      if(data){
        setCache(data);
        const parsed=ispit?parsePitching(data.career):parseHitting(data.career);
        setStats({...E,...parsed});
        setAgeNote("Stats loaded from Lahman Database");
      }else{
        setAgeNote("Could not load stats \u2014 enter manually");
      }
    }else{
      // Person fetch failed but we have search data
      setPlayerType(p.isPitcher?"pitcher":"batter");
      if(p.pos!=="?")setPosition(mapPos(p.pos));
      if(p.currentAge)setCurrentAge(String(p.currentAge));
      setAgeNote("Could not load full details \u2014 enter stats manually");
    }
    setLoading(false);
  };

  // ── Age changed — recalculate from yearByYear ──
  const handleAgeChange=(e)=>{
    const val=e.target.value;setCurrentAge(val);setSubmitted(false);
    const age=parseInt(val);if(!age||!birthYear||!cache?.yearByYear)return;
    const playerAge=selPlayer?parseInt(currentAge)||0:0;
    const realAge=new Date().getFullYear()-birthYear;

    if(age>=realAge){
      // Current or future — show full career stats
      if(cache){const parsed=isP?parsePitching(cache.career):parseHitting(cache.career);setStats(prev=>({...prev,...parsed}))}
      setAgeNote(age>realAge?"Beyond current age \u2014 use projection slider":"");
    }else{
      // Prior age — sum yearByYear
      const summed=sumToAge(cache.yearByYear,birthYear,age,isP);
      if(summed){const parsed=isP?parseSumP(summed):parseSumH(summed);setStats(prev=>({...prev,...parsed}));setAgeNote("Actual stats through age "+age+" season")}
      else setAgeNote("No Lahman data found for age "+age);
    }
    if(parseInt(projectionAge)<age)setProjectionAge(age);
  };

  const activeStats=useMemo(()=>{const a=parseInt(currentAge)||28,pa=parseInt(projectionAge)||a;
    if(showProjection&&pa>a)return projectStats(stats,a,pa,isP,performanceMult);return stats;
  },[stats,showProjection,projectionAge,currentAge,isP,performanceMult]);

  const result=useMemo(()=>{if(!submitted||!Object.values(stats).some(v=>v!==""))return null;
    return calcHOF(activeStats,position,isP);
  },[activeStats,position,isP,stats,submitted]);

  const handleCalc=()=>{if(Object.values(stats).some(v=>v!==""))setSubmitted(true)};
  const bPos=["C","1B","2B","3B","SS","LF","CF","RF","DH"],pPos=["SP","RP"];
  const positions=isP?pPos:bPos;
  useEffect(()=>{if(isP&&!pPos.includes(position))setPosition("SP");if(!isP&&!bPos.includes(position))setPosition("SS")},[isP]);

  const rs=(v,mn,mx)=>({width:"100%",height:"6px",WebkitAppearance:"none",appearance:"none",borderRadius:"3px",background:"linear-gradient(to right,#c4913a 0%,#c4913a "+((v-mn)/(mx-mn)*100)+"%,#2a2320 "+((v-mn)/(mx-mn)*100)+"%,#2a2320 100%)",outline:"none",cursor:"pointer"});
  const ss={background:"#14110e",border:"1px solid #2a2320",borderRadius:"12px",padding:"16px",marginBottom:"16px"};
  const st={fontSize:"11px",fontWeight:700,letterSpacing:".1em",color:"#c4913a",marginBottom:"12px",textTransform:"uppercase"};
  const rw={display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"};

  return(
    <div style={{minHeight:"100vh",background:"#0f0d0a",color:"#e8dcc8",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{background:"linear-gradient(180deg,#1a1510 0%,#0f0d0a 100%)",borderBottom:"1px solid #2a2320",padding:"28px 0 20px",textAlign:"center"}}>
        <div style={{fontSize:"10px",fontWeight:800,letterSpacing:".3em",color:"#c4913a",marginBottom:"6px"}}>COOPERSTOWN PROJECTION SYSTEM</div>
        <h1 style={{fontSize:"clamp(28px,5vw,40px)",fontWeight:900,fontFamily:"'Playfair Display',serif",color:"#e8dcc8",margin:0,letterSpacing:"-.02em",lineHeight:1.1}}>Hall of Fame Calculator</h1>
        <div style={{fontSize:"12px",color:"#6b5c4a",marginTop:"8px"}}>Powered by Lahman Database {"\u00B7"} Search any player in MLB history</div>
      </div>

      <div style={{maxWidth:"680px",margin:"0 auto",padding:"20px 16px 60px"}} key={resetKey}>

        <div style={{display:"flex",gap:"2px",background:"#1a1612",borderRadius:"10px",padding:"3px",marginBottom:"16px",border:"1px solid #2a2320"}}>
          {["batter","pitcher"].map(t=>(<button key={t} onClick={()=>{setPlayerType(t);setSubmitted(false)}} style={{flex:1,padding:"10px",borderRadius:"8px",border:"none",fontWeight:700,fontSize:"13px",letterSpacing:".06em",textTransform:"uppercase",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s",background:playerType===t?"#c4913a":"transparent",color:playerType===t?"#0f0d0a":"#6b5c4a"}}>{t==="batter"?"Position Player":"Pitcher"}</button>))}
        </div>

        <div style={{display:"flex",gap:"10px",marginBottom:"6px",flexWrap:"wrap",alignItems:"flex-end"}}>
          <PS value={playerName} onChange={v=>{setPlayerName(v);if(!v){setSelPlayer(null);setAgeNote("");setCache(null);setBirthYear(null)}}} onSelect={handlePlayerSelect}/>
          <div style={{flex:"0 0 80px"}}>
            <label style={{display:"block",fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#8B7355",marginBottom:"4px"}}>Age</label>
            <input type="text" inputMode="numeric" value={currentAge} onChange={handleAgeChange} placeholder="Auto" style={{width:"100%",padding:"8px 10px",background:"#1a1612",border:"1px solid #3d3228",borderRadius:"6px",color:"#e8dcc8",fontSize:"15px",fontFamily:"'IBM Plex Mono',monospace",fontWeight:500,outline:"none",boxSizing:"border-box",minHeight:"44px"}}/>
          </div>
        </div>

        {(ageNote||loading)&&<div style={{fontSize:"11px",color:"#c4913a",marginBottom:"10px",fontStyle:"italic",paddingLeft:"2px"}}>
          {loading?<><span className="spinner" style={{marginRight:"6px"}}/>Loading Lahman data...</>:"\u2139\uFE0F "+ageNote}
        </div>}

        <div style={{marginBottom:"16px"}}>
          <label style={{display:"block",fontSize:"10px",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#8B7355",marginBottom:"6px"}}>Position</label>
          <div style={{display:"flex",gap:"3px",flexWrap:"wrap"}}>{positions.map(p=>(<button key={p} onClick={()=>setPosition(p)} style={{padding:"7px 10px",borderRadius:"6px",fontSize:"12px",fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer",minWidth:"36px",textAlign:"center",border:position===p?"1px solid #c4913a":"1px solid #2a2320",background:position===p?"rgba(196,145,58,.15)":"#1a1612",color:position===p?"#c4913a":"#6b5c4a"}}>{p}</button>))}</div>
        </div>

        <div style={ss}><div style={st}>{isP?"\u26BE Pitching Stats (from Lahman)":"\u26BE Counting Stats (from Lahman)"}</div>
          {!isP?(<><div style={rw}><SI small label="Hits" name="hits" value={stats.hits} onChange={hsc}/><SI small label="Home Runs" name="hr" value={stats.hr} onChange={hsc}/><SI small label="RBI" name="rbi" value={stats.rbi} onChange={hsc}/><SI small label="Runs" name="runs" value={stats.runs} onChange={hsc}/></div>
            <div style={rw}><SI small label="SB" name="sb" value={stats.sb} onChange={hsc}/><SI small label="AVG" name="avg" value={stats.avg} onChange={hsc}/></div></>)
          :(<div style={rw}><SI small label="Wins" name="wins" value={stats.wins} onChange={hsc}/><SI small label="Strikeouts" name="k" value={stats.k} onChange={hsc}/><SI small label="Saves" name="saves" value={stats.saves} onChange={hsc}/><SI small label="IP" name="ip" value={stats.ip} onChange={hsc}/></div>)}
        </div>

        <div style={ss}><div style={{...st,color:"#e67e22"}}>{"\uD83D\uDCCA"} Advanced (enter from Baseball-Reference)</div>
          <div style={{fontSize:"10px",color:"#6b5c4a",marginBottom:"10px"}}>WAR, OPS+, ERA+, JAWS not in Lahman data. Look up on baseball-reference.com.</div>
          <div style={rw}><SI small label="Career bWAR" name="war" value={stats.war} onChange={hsc} placeholder="e.g. 72.8"/><SI small label="Peak 7yr WAR" name="peak7war" value={stats.peak7war} onChange={hsc} placeholder="e.g. 42.8"/></div>
          <div style={rw}>{!isP?<SI small label="OPS+" name="opsPlus" value={stats.opsPlus} onChange={hsc} placeholder="e.g. 145"/>:<SI small label="ERA+" name="eraPlus" value={stats.eraPlus} onChange={hsc} placeholder="e.g. 135"/>}</div>
        </div>

        <div style={{...ss,marginBottom:"20px"}}><div style={st}>{"\uD83C\uDFC6"} Awards (enter manually)</div>
          <div style={rw}><SI small label="All-Stars" name="allstar" value={stats.allstar} onChange={hsc}/>
            {!isP?(<><SI small label="MVPs" name="mvp" value={stats.mvp} onChange={hsc}/><SI small label="Gold Gloves" name="goldGlove" value={stats.goldGlove} onChange={hsc}/></>)
            :(<SI small label="Cy Youngs" name="cyYoung" value={stats.cyYoung} onChange={hsc}/>)}</div>
        </div>

        <button onClick={handleCalc} style={{width:"100%",padding:"14px",borderRadius:"10px",border:"none",marginBottom:"20px",background:"linear-gradient(135deg,#c4913a 0%,#a67520 100%)",color:"#0f0d0a",fontSize:"15px",fontWeight:800,letterSpacing:".08em",textTransform:"uppercase",cursor:"pointer",boxShadow:"0 4px 16px rgba(196,145,58,.25)"}}>Calculate HOF Probability</button>

        {result&&(<div style={{background:"linear-gradient(135deg,#1a1612 0%,#14110e 100%)",border:"1px solid #2a2320",borderRadius:"16px",padding:"24px",marginBottom:"20px",textAlign:"center"}}>
          {playerName&&<div style={{fontSize:"22px",fontWeight:800,fontFamily:"'Playfair Display',serif",color:"#e8dcc8",marginBottom:"4px"}}>{playerName}</div>}
          <div style={{fontSize:"11px",color:"#6b5c4a",fontWeight:600,letterSpacing:".08em",marginBottom:"16px"}}>
            {(PJ[position]||{}).label||position}{currentAge&&" \u00B7 Age "+currentAge}
            {ageNote&&!ageNote.includes("Beyond")&&!ageNote.includes("loaded")&&<span style={{color:"#c4913a"}}> \u00B7 {ageNote}</span>}
            {showProjection&&parseInt(projectionAge)>(parseInt(currentAge)||28)&&<span style={{color:"#c4913a"}}> \u2192 Projected to age {projectionAge}</span>}
          </div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:"16px"}}><GR probability={result.probability}/></div>
          {result.milestoneHits.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"6px",justifyContent:"center",marginTop:"12px"}}>{result.milestoneHits.map((m,i)=><MC key={i}{...m}/>)}</div>}
          {showProjection&&parseInt(projectionAge)>(parseInt(currentAge)||28)&&(
            <div style={{marginTop:"16px",padding:"12px",background:"#0f0d0a",borderRadius:"10px",border:"1px solid #2a2320"}}>
              <div style={{fontSize:"10px",fontWeight:700,letterSpacing:".1em",color:"#6b5c4a",marginBottom:"8px",textTransform:"uppercase"}}>Projected Stats at Age {projectionAge}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"12px",justifyContent:"center"}}>
                {!isP?(<>{activeStats.war&&<SC label="WAR" value={activeStats.war}/>}{activeStats.hits&&<SC label="H" value={Number(activeStats.hits).toLocaleString()}/>}{activeStats.hr&&<SC label="HR" value={Number(activeStats.hr).toLocaleString()}/>}{activeStats.rbi&&<SC label="RBI" value={Number(activeStats.rbi).toLocaleString()}/>}</>)
                :(<>{activeStats.war&&<SC label="WAR" value={activeStats.war}/>}{activeStats.wins&&<SC label="W" value={Number(activeStats.wins).toLocaleString()}/>}{activeStats.k&&<SC label="K" value={Number(activeStats.k).toLocaleString()}/>}</>)}
              </div></div>)}
        </div>)}

        <div style={ss}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <div style={st}>{"\uD83D\uDD2E"} Career Projection</div>
            <button onClick={()=>setShowProjection(!showProjection)} style={{padding:"4px 12px",borderRadius:"100px",fontSize:"11px",fontWeight:700,cursor:"pointer",border:showProjection?"1px solid #c4913a":"1px solid #3d3228",background:showProjection?"rgba(196,145,58,.15)":"transparent",color:showProjection?"#c4913a":"#6b5c4a"}}>{showProjection?"ON":"OFF"}</button>
          </div>
          {showProjection&&(<>
            <div style={{marginBottom:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}}><span style={{fontSize:"11px",color:"#8B7355",fontWeight:600}}>Project to Age</span><span style={{fontSize:"22px",fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:"#e8dcc8"}}>{projectionAge}</span></div>
              <input type="range" min={parseInt(currentAge)||20} max={42} value={projectionAge} onChange={e=>setProjectionAge(parseInt(e.target.value))} style={rs(projectionAge,parseInt(currentAge)||20,42)}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#4a3f33",marginTop:"2px",fontFamily:"'IBM Plex Mono',monospace"}}><span>{parseInt(currentAge)||20}</span><span>42</span></div>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"6px"}}><span style={{fontSize:"11px",color:"#8B7355",fontWeight:600}}>Performance Level</span><span style={{fontSize:"14px",fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:performanceMult>=1.1?"#4CAF50":performanceMult<=.7?"#c0392b":"#e8dcc8"}}>{(performanceMult*100).toFixed(0)}%</span></div>
              <input type="range" min={50} max={130} value={performanceMult*100} onChange={e=>setPerformanceMult(parseInt(e.target.value)/100)} style={rs(performanceMult*100,50,130)}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#4a3f33",marginTop:"2px"}}><span>Injury decline</span><span>Normal aging</span><span>Elite health</span></div>
            </div></>)}
        </div>

        <button onClick={resetAll} style={{width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid #2a2320",background:"#14110e",color:"#6b5c4a",fontSize:"12px",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",cursor:"pointer"}}>Clear All & Reset</button>

        <div style={{marginTop:"24px",padding:"14px",background:"#14110e",borderRadius:"10px",border:"1px solid #1e1a16"}}>
          <div style={{fontSize:"10px",fontWeight:700,letterSpacing:".1em",color:"#4a3f33",marginBottom:"6px",textTransform:"uppercase"}}>How It Works</div>
          <div style={{fontSize:"11px",color:"#5a4e3e",lineHeight:1.6}}>
            <b style={{color:"#8B7355"}}>Auto-filled:</b> Counting stats (H, HR, RBI, W, K, etc.), position, and age loaded from the Lahman Database. Change the age to see actual year-by-year stats through that season.
            <br/><br/><b style={{color:"#e67e22"}}>Manual:</b> WAR, Peak WAR, OPS+, ERA+, awards — look these up on <b>baseball-reference.com</b>.
            <br/><br/><b style={{color:"#8B7355"}}>Model:</b> Weighted milestones + JAWS + aging curves for projections.
          </div>
        </div>
      </div>
    </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
